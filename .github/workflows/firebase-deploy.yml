name: Deploy to Firebase

on:
  push:
    branches:
      - main

jobs:
  build_and_deploy:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v3

      - run: npm install

      - run: npm run build

      - run: npm install -g firebase-tools

      - run: firebase deploy --only hosting --token "${{ secrets.FIREBASE_TOKEN }}"
